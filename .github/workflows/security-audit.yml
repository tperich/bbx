name: Security Audit

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Build runtime requirements from pyproject
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path('pyproject.toml').read_text(encoding='utf-8'))
          deps = data.get('project', {}).get('dependencies', [])
          Path('.audit-requirements.txt').write_text('\n'.join(deps) + '\n', encoding='utf-8')
          print('Wrote .audit-requirements.txt with', len(deps), 'dependency entries')
          PY
          cat .audit-requirements.txt

      - name: Run pip-audit (runtime dependencies only)
        run: |
          pip-audit -r .audit-requirements.txt
