name: Security Audit

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install . pip-audit

      - name: Run pip-audit
        run: |
          # Audit installed environment (project + dependencies)
          pip-audit
