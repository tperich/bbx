name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install . pytest

      - name: Bytecode sanity
        run: |
          python -m compileall bbx.py bbx

      - name: Run unit tests
        run: |
          pytest -q

      - name: CLI smoke checks
        run: |
          python bbx.py init ci_ws
          python bbx.py import-har ci_ws samples/session.har
          python bbx.py rank ci_ws
          python bbx.py top ci_ws --limit 3 --format json
          python bbx.py graph ci_ws --format json
          python bbx.py export ci_ws requests --format csv
